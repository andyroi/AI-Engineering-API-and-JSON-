<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJ Bot</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lightweight markdown parser so AI responses render nicely -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Firebase SDKs (compat versions for simple script-tag usage) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

    <!-- ── Auth Screen (shown when logged out) ──────────────── -->
    <div class="auth-screen" id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">AJ</div>
            <h2 id="auth-title">Welcome Back</h2>
            <p class="auth-subtitle">Sign in to chat with AJ Bot</p>

            <form id="auth-form" autocomplete="off">
                <input type="email"    id="auth-email"    placeholder="Email" required>
                <input type="password" id="auth-password" placeholder="Password" required>
                <button type="submit"  id="auth-submit">Log In</button>
            </form>

            <p class="auth-error" id="auth-error"></p>
            <button class="auth-toggle" id="auth-toggle">Don't have an account? Sign up</button>
        </div>
    </div>

    <!-- ── Chat App (shown when logged in) ──────────────────── -->
    <div class="chat-container" id="chat-app" style="display: none;">
        <!-- Header -->
        <div class="chat-header">
            <div class="avatar">AJ</div>
            <div class="header-info">
                <h1>AJ Bot</h1>
                <span>Online</span>
            </div>
            <!-- Dark / Light toggle -->
            <label class="theme-toggle" title="Toggle dark mode">
                <input type="checkbox" id="theme-switch">
                <span class="toggle-track">
                    <span class="icon sun">☀️</span>
                    <span class="icon moon">🌙</span>
                </span>
            </label>
            <!-- Logout button -->
            <button id="logout-btn" class="logout-btn" title="Log out">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
            </button>
        </div>

        <!-- Chat Messages -->
        <div id="chat-box">
            <div class="welcome" id="welcome">
                <h2>Hello!</h2>
                <p>Ask me about finance, gaming, anime, or life advice.</p>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typing">
            <span></span><span></span><span></span>
        </div>

        <!-- Input Bar -->
        <div class="input-bar">
            <input type="text" id="input-box" placeholder="Message AJ Bot…" autocomplete="off">
            <button id="send-btn" aria-label="Send">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                </svg>
            </button>
        </div>
    </div>

    <!-- Scripts: auth first (sets up Firebase + login), then chat (uses getAuthToken) -->
    <script src="auth.js"></script>
    <script src="chat.js"></script>
</body>
</html>
